name: CI/CD Pipeline

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: localhost:5000
  IMAGE_TAG: ${{ github.sha }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Lint Python (flake8)
        run: |
          pip install flake8
          flake8 api/ worker/ --max-line-length=100 --extend-ignore=E501
      
      - name: Lint JavaScript (eslint)
        run: |
          cd frontend
          npm install eslint @eslint/js
          npx eslint app.js
      
      - name: Lint Dockerfiles (hadolint)
        run: |
          docker pull hadolint/hadolint
          docker run --rm -v $PWD:/workspace hadolint/hadolint hadolint /workspace/api/Dockerfile
          docker run --rm -v $PWD:/workspace hadolint/hadolint hadolint /workspace/worker/Dockerfile
          docker run --rm -v $PWD:/workspace hadolint/hadolint hadolint /workspace/frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install API dependencies
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock
      
      - name: Run API tests with coverage
        run: |
          cd api
          pytest test_api.py --cov=. --cov-report=xml --cov-report=html || true
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/htmlcov/

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build API image
        run: docker build -t hng-api:test ./api
      
      - name: Build Worker image
        run: docker build -t hng-worker:test ./worker
      
      - name: Build Frontend image
        run: docker build -t hng-frontend:test ./frontend

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Pull images from local registry
        run: |
          docker pull $REGISTRY/api:latest || echo "API image not found"
          docker pull $REGISTRY/worker:latest || echo "Worker image not found"
          docker pull $REGISTRY/frontend:latest || echo "Frontend image not found"
      
      - name: Run Trivy vulnerability scanner on API
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/api:latest'
          format: 'sarif'
          output: 'trivy-api.sarif'
          severity: 'CRITICAL'
          exit-code: 0
        continue-on-error: true
      
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-api.sarif'
        continue-on-error: true

  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build all images
        run: |
          docker build -t hng-api:test ./api
          docker build -t hng-worker:test ./worker
          docker build -t hng-frontend:test ./frontend
      
      - name: Start services
        run: |
          docker network create test-network
          docker run -d --name redis --network test-network redis:7-alpine
          docker run -d --name api --network test-network -p 8000:8000 -e REDIS_HOST=redis hng-api:test
          docker run -d --name worker --network test-network -e REDIS_HOST=redis hng-worker:test
          docker run -d --name frontend --network test-network -p 3000:3000 -e API_URL=http://api:8000 hng-frontend:test
      
      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to be ready..."
          for i in {1..30}; do
            if docker exec redis redis-cli ping 2>/dev/null; then echo "✅ Redis ready"; break; fi; sleep 2
          done
          for i in {1..30}; do
            if curl -s -f http://localhost:8000/health > /dev/null 2>&1; then echo "✅ API ready"; break; fi; sleep 2
          done
          for i in {1..30}; do
            if curl -s -f http://localhost:3000/health > /dev/null 2>&1; then echo "✅ Frontend ready"; break; fi; sleep 2
          done
          docker ps -a

      - name: Show logs if services failed
        if: always()
        run: |
          echo "=== Frontend Logs ==="
          docker logs frontend || true
          echo "=== Worker Logs ==="
          docker logs worker || true
          echo "=== API Logs ==="
          docker logs api || true

      
      - name: Run integration test
        run: |
          # Submit a job
          JOB_RESPONSE=$(curl -s -X POST http://localhost:8000/jobs -H "Content-Type: application/json" -d "{}")
          echo "Job response: $JOB_RESPONSE"
          
          JOB_ID=$(echo $JOB_RESPONSE | grep -o '"job_id":"[^"]*"' | cut -d'"' -f4)
          echo "Job ID: $JOB_ID"

          # Check Redis queue
          echo "=== Redis Queue Check ==="
          docker exec redis redis-cli lrange job 0 -1 || true
        
          # Check worker logs
          echo "=== Worker Logs During Test ==="
          docker logs worker || true
          
          for i in {1..30}; do
            STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | grep -o '"status":"[^"]*"' | cut -d'"' -f4)
            echo "Job status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "✅ Integration test passed!"
              exit 0
            fi
            sleep 2
          done

          # Final debug logs
          echo "=== Final Worker Logs ==="
          docker logs worker || true
          echo "=== Final Redis Queue ==="
          docker exec redis redis-cli lrange job 0 -1 || true

          echo "❌ Job did not complete"
          exit 1
      
      - name: Cleanup
        if: always()
        run: |
          docker stop frontend api worker redis || true
          docker rm frontend api worker redis || true
          docker network rm test-network || true
  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy with rolling update
        run: |
          echo "Starting rolling deployment..."
          chmod +x ./scripts/rolling-update.sh
          ./scripts/rolling-update.sh